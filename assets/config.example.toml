# OpenRGB server connection
openrgb_host = "127.0.0.1"
openrgb_port = 6742
openrgb_device_id = 0
openrgb_zone_ids = [0, 1]

# Polling interval in seconds
poll_interval = 1

# Temperature EMA smoothing: 1.0 = no smoothing, 0.1 = very smooth
temp_smoothing = 1.0

# Color transition smoothing
transition_steps = 1
transition_interval_ms = 100

# Temperature thresholds in Celsius
[temperature]
cold = 35.0
warm = 55.0
hot = 75.0

# Colors as [r, g, b] for each threshold
[colors]
cold = [0, 0, 255]
warm = [255, 255, 0]
hot = [255, 0, 0]

# Effects profiles. The active_profile selects which one runs.
[effects]
active_profile = "temperature"

[[effects.profiles]]
name = "temperature"

[[effects.profiles.effects]]
type = "temperature"

[[effects.profiles]]
name = "load"

[[effects.profiles.effects]]
type = "cpu_usage"
low = 0.0
high = 100.0
low_color = [0, 255, 0]
high_color = [255, 0, 0]

[[effects.profiles]]
name = "pulse"

[[effects.profiles.effects]]
type = "temperature"

[[effects.profiles.effects]]
type = "pulse"
color = [255, 0, 0]
speed = 2.0

[[effects.profiles]]
name = "breathe"

[[effects.profiles.effects]]
type = "temperature"

[[effects.profiles.effects]]
type = "breathe"
speed = 0.5

[[effects.profiles]]
name = "cycle"

[[effects.profiles.effects]]
type = "cycle"
speed = 0.2

# Schedules switch profiles automatically based on time of day.
# outside_range can be "active_profile" (fallback to active_profile) or "off" (lights off).
[[effects.schedules]]
start = "08:00"
end = "18:00"
profile = "load"
outside_range = "active_profile"

[[effects.schedules]]
start = "22:00"
end = "06:00"
profile = "breathe"
outside_range = "off"

# Dry-run mode: log intended color changes without contacting OpenRGB
dry_run = true
