name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create release tarball
        run: |
          mkdir -p dist/lighthouse/usr/local/bin
          mkdir -p dist/lighthouse/etc/lighthouse
          mkdir -p dist/lighthouse/etc/systemd/system
          cp target/x86_64-unknown-linux-gnu/release/lighthouse dist/lighthouse/usr/local/bin/
          cp assets/config.example.toml dist/lighthouse/etc/lighthouse/config.toml
          cp assets/systemd/lighthouse.service dist/lighthouse/etc/systemd/system/
          cat > dist/install.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          SRC="$(cd "$(dirname "$0")" && pwd)"
          echo "Installing Lighthouse from $SRC"
          sudo cp "$SRC/lighthouse/usr/local/bin/lighthouse" /usr/local/bin/
          sudo mkdir -p /etc/lighthouse
          sudo cp -n "$SRC/lighthouse/etc/lighthouse/config.toml" /etc/lighthouse/config.toml || true
          sudo cp "$SRC/lighthouse/etc/systemd/system/lighthouse.service" /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo useradd -r -s /usr/sbin/nologin lighthouse || true
          echo "Lighthouse installed. Edit /etc/lighthouse/config.toml, then run:"
          echo "  sudo systemctl enable --now lighthouse"
          EOF
          chmod +x dist/install.sh
          cd dist && tar czf lighthouse-install.tar.gz install.sh lighthouse/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lighthouse-install.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
